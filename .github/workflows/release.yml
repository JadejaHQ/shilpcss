# Purpose: Publish to NPM
# Trigger: pull_request (merged to main from changeset-release branch)

name: RELEASE

on:
  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - "packages/shilpcss/package.json"

permissions:
  id-token: write # authenticate with OIDC for secure deployments
  contents: write # create commits, tags, releases
  pull-requests: read # only read access needed for publish workflow

jobs:
  release:
    if: >
      github.repository_owner == 'JadejaHQ' && github.event_name ==
      'pull_request' && github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'changeset-release')
    name: Publish ShilpCSS to NPM
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the repository
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref:
            ${{ github.event.workflow_run.head_sha ||
            github.event.pull_request.head.sha }}

      # 2. Check for pending changesets
      - name: Check for pending changesets
        id: changesets
        run: |
          if ls .changeset/*.md 1> /dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "Changesets detected"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No changesets found — stopping job"
            exit 0

      # 2. Setup PNPM (to provide access to setup-node `cache: pnpm`)
      - name: Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          version: 10.x.x
          run_install: false
          cache: true

      # 3. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # 4. Install dependencies (prevent when lockfile is out of sync)
      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      # 5. Publish to NPM
      - name: Publish
        uses: changesets/action@v1.7
        with:
          publish: "pnpm publish-it --filter=shilpcss"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.SHILPCSS_GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.SHILPCSS_NPM_TOKEN }}
          NODE_ENV: production

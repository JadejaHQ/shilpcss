# Purpose: Deploy docs to GitHub Pages
# Trigger: pull_request (merged to main), workflow_run (CI), workflow_dispatch

name: DOCS

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - "apps/docs/package.json"

  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (leave empty for latest)"
        required: false

permissions:
  id-token: write # authenticate with OIDC for secure deployments
  contents: read # checkout code
  pages: write # deploy to GitHub Pages

jobs:
  deploy:
    if: >
      github.repository_owner == 'JadejaHQ' && (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.pull_request.merged == true
        )
      )
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout the repository
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.commit_sha || github.event.workflow_run.head_sha }}

      # 2. Setup PNPM (to provide access to setup-node `cache: pnpm`)
      - name: Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          version: 10.x.x
          run_install: false
          cache: true

      # 3. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # 4. Install dependencies (prevent when lockfile is out of sync)
      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      # 4. Build docs
      - name: Build docs
        run: pnpm build --filter=shilpcss-docs

      # 5. Setup Pages
      - name: Setup Pages
        uses: actions/configure-pages@v6

      # 6. Upload artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/docs/dist

      # 7. Deploy to GitHub Pages
      - name: Deploy
        id: deployment # required so `environment.url` can read page_url
        uses: actions/deploy-pages@v5

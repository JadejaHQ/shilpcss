# Purpose: Deploy docs to GitHub Pages
# Trigger: pull_request (merged to main), workflow_run (CI), workflow_dispatch

name: DOCS

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (leave empty for latest)"
        required: false

permissions:
  id-token: write # authenticate with OIDC for secure deployments
  contents: read # checkout code
  pages: write # deploy to GitHub Pages

jobs:
  deploy:
    # Main guard:
    # - Always allow manual dispatch
    # - Otherwise require:
    #     CI success
    #     event from pull_request
    #     PR merged
    #     base branch is main
    if: >
      github.repository_owner == 'JadejaHQ' && (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'pull_request' &&
          github.event.workflow_run.pull_requests[0].merged == true &&
          github.event.workflow_run.pull_requests[0].base.ref == 'main'
        )
      )
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout the repository
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Manual → use provided SHA or latest
          # workflow_run → use CI head SHA
          ref: ${{ inputs.commit_sha || github.event.workflow_run.head_sha }}

      # 2. Check if docs version changed (skip if not triggered by workflow_run)
      - name: Check docs version change
        id: docs_changed
        if: github.event_name == 'workflow_run'
        run: |
          # Compare latest commit with its parent
          CHANGED_FILES=$(git diff --name-only \
            ${{ github.event.workflow_run.head_sha }} \
            ${{ github.event.workflow_run.head_sha }}^)

          if echo "$CHANGED_FILES" | grep -q "^apps/docs/package.json$"; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Docs version change detected"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No docs version change"
          fi

      # 3. Stop deployment if docs not changed (except manual)
      - name: Stop if docs not changed
        if: >
          github.event_name == 'workflow_run' &&
          steps.docs_changed.outputs.changed != 'true'
        run: |
          echo "Docs package.json not changed — skipping deployment"
          exit 0

      # 4. Setup PNPM (to provide access to setup-node `cache: pnpm`)
      - name: Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          version: 10.x.x
          run_install: false
          cache: true

      # 5. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # 6. Install dependencies (prevent when lockfile is out of sync)
      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      # 7. Build docs
      - name: Build docs
        run: pnpm build --filter=shilpcss-docs

      # 8. Setup Pages
      - name: Setup Pages
        uses: actions/configure-pages@v6

      # 9. Upload artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/docs/dist

      # 10. Deploy to GitHub Pages
      - name: Deploy
        id: deployment # required so `environment.url` can read page_url
        uses: actions/deploy-pages@v5
